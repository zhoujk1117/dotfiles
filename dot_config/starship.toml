"$schema" = "https://starship.rs/config-schema.json"
palette = "noctalia"
add_newline = true
command_timeout = 1000

# Keep the prompt in step with Alacritty's fixed dark palette.
format = "$directory$git_branch$git_status$character"
right_format = "$c$cpp$golang$java$nodejs$python$rust$cmd_duration$time"

[character]
success_symbol = "[❯](bold cyan)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold mauve)"

[directory]
format = "[$path]($style) "
style = "bold blue"
truncation_length = 3
truncate_to_repo = false

[directory.substitutions]
Documents = "docs"
Downloads = "dl"
Pictures = "pics"

[git_branch]
format = "[$symbol$branch]($style) "
symbol = "git:"
style = "bold cyan"

[git_status]
format = "([$all_status$ahead_behind]($style))"
style = "bold yellow"
up_to_date = "[✓](bold cyan)"
untracked = "?[${count}]"
modified = "![${count}]"
staged = "+[${count}]"
deleted = "x[${count}]"
ahead = "↑[${count}]"
behind = "↓[${count}]"
diverged = "↑[${ahead_count}]↓[${behind_count}]"

[cmd_duration]
min_time = 500
format = "[took $duration](subtext1) "

[time]
disabled = false
format = "[$time](subtext0)"
time_format = "%H:%M"

[c]
format = "[c:$version](mauve) "
[cpp]
format = "[cpp:$version](mauve) "
[golang]
format = "[go:$version](mauve) "
[java]
format = "[java:$version](mauve) "
[nodejs]
format = "[node:$version](mauve) "
[python]
format = "[py:$version](mauve) "
[rust]
format = "[rs:$version](mauve) "

[palettes.warp]
blue      = "#7cafc2"
red       = "#cc6666"
green     = "#a1b56c"
yellow    = "#f7ca88"
cyan      = "#86c1b9"
magenta   = "#ba8baf"
white     = "#f8f8f8"
black     = "#181818"
rosewater = "#d8d8d8"
flamingo  = "#cc6666"
pink      = "#c89fbc"
mauve     = "#ba8baf"
maroon    = "#ab4642"
peach     = "#f0c674"
teal      = "#8abeb7"
sky       = "#86c1b9"
sapphire  = "#7cafc2"
lavender  = "#9abfd0"
text      = "#d8d8d8"
subtext1  = "#b8b8b8"
subtext0  = "#686868"
overlay2  = "#585858"
overlay1  = "#484848"
overlay0  = "#383838"
surface2  = "#303030"
surface1  = "#282828"
surface0  = "#202020"
base      = "#181818"
mantle    = "#141414"
crust     = "#101010"

