"$schema" = "https://starship.rs/config-schema.json"
palette = "noctalia"
add_newline = true
command_timeout = 1000

# Keep the prompt in step with Alacritty's fixed dark palette.
format = "$directory$git_branch$git_status$character"
right_format = "$c$cpp$golang$java$nodejs$python$rust$cmd_duration$time"

[character]
success_symbol = "[❯](bold cyan)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold mauve)"

[directory]
format = "[$path]($style) "
style = "bold blue"
truncation_length = 3
truncate_to_repo = false

[directory.substitutions]
Documents = "docs"
Downloads = "dl"
Pictures = "pics"

[git_branch]
format = "[$symbol$branch]($style) "
symbol = "git:"
style = "bold cyan"

[git_status]
format = "([$all_status$ahead_behind]($style))"
style = "bold yellow"
up_to_date = "[✓](bold cyan)"
untracked = "?[${count}]"
modified = "![${count}]"
staged = "+[${count}]"
deleted = "x[${count}]"
ahead = "↑[${count}]"
behind = "↓[${count}]"
diverged = "↑[${ahead_count}]↓[${behind_count}]"

[cmd_duration]
min_time = 500
format = "[took $duration](subtext1) "

[time]
disabled = false
format = "[$time](subtext0)"
time_format = "%H:%M"

[c]
format = "[c:$version](mauve) "
[cpp]
format = "[cpp:$version](mauve) "
[golang]
format = "[go:$version](mauve) "
[java]
format = "[java:$version](mauve) "
[nodejs]
format = "[node:$version](mauve) "
[python]
format = "[py:$version](mauve) "
[rust]
format = "[rs:$version](mauve) "

