magenta   = "#ba8baf"
white     = "#f8f8f8"
black     = "#181818"
rosewater = "#d8d8d8"
flamingo  = "#cc6666"
pink      = "#c89fbc"
mauve     = "#ba8baf"
maroon    = "#ab4642"
peach     = "#f0c674"
teal      = "#8abeb7"
sky       = "#86c1b9"
sapphire  = "#7cafc2"
lavender  = "#9abfd0"
text      = "#d8d8d8"
subtext1  = "#b8b8b8"
subtext0  = "#686868"
overlay2  = "#585858"
overlay1  = "#484848"
overlay0  = "#383838"
surface2  = "#303030"
surface1  = "#282828"
surface0  = "#202020"
base      = "#181818"
mantle    = "#141414"
crust     = "#101010"

