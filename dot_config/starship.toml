"$schema" = "https://starship.rs/config-schema.json"
palette = "noctalia"
add_newline = true
command_timeout = 1000

format = """
[╭─](fg:overlay0)\
$directory\
$git_branch\
$git_status\
$fill\
$c\
$cpp\
$golang\
$java\
$nodejs\
$python\
$rust\
$cmd_duration\
$time\
$line_break\
[╰─](fg:overlay0)\
$character"""

[character]
success_symbol = "[❯](bold mauve)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
format = "[$path]($style) "
style = "bold mauve"
truncation_length = 3
truncate_to_repo = false

[directory.substitutions]
Documents = "docs"
Downloads = "dl"
Pictures = "pics"

[fill]
symbol = "·"
style = "overlay0"

[git_branch]
format = "[$symbol$branch]($style) "
symbol = "git:"
style = "cyan"

[git_status]
format = "([$all_status$ahead_behind]($style))"
style = "yellow"
up_to_date = "[✓](green)"
untracked = "?[${count}]"
modified = "![${count}]"
staged = "+[${count}]"
deleted = "x[${count}]"
ahead = "↑[${count}]"
behind = "↓[${count}]"
diverged = "↑[${ahead_count}]↓[${behind_count}]"

[cmd_duration]
min_time = 500
format = "[took $duration](overlay1) "

[time]
disabled = false
format = "[$time](text) "
time_format = "%H:%M"

[c]
format = "[c:$version](green) "
[cpp]
format = "[cpp:$version](green) "
[golang]
format = "[go:$version](green) "
[java]
format = "[java:$version](green) "
[nodejs]
format = "[node:$version](green) "
[python]
format = "[py:$version](green) "
[rust]
format = "[rs:$version](green) "

