# Noctalia v5 configuration
# Migrated from the previous v4 settings and adapted from LanRhyme/dotfiles

[shell]
lang = "zh-Hans"
clipboard_enabled = true
polkit_agent = true
setup_wizard_enabled = false
telemetry_enabled = false

[shell.launcher]
app_grid = true
categories = true
session_search = true
sort_by_usage = false

[shell.panel]
launcher_placement = "floating"
launcher_position = "center"
clipboard_placement = "floating"
clipboard_position = "center"
control_center_placement = "attached"
session_placement = "attached"
wallpaper_placement = "attached"

[bar]
order = ["default"]

[bar.default]
enabled = true
position = "top"
thickness = 36
background_opacity = 0.93
radius = 12
margin_ends = 0
margin_edge = 2
margin_opposite_edge = 2
padding = 6
widget_spacing = 6
shadow = false
reserve_space = true
start = ["launcher", "clock", "cpu", "ram"]
center = ["workspaces"]
end = ["active_window", "media", "tray", "notifications", "volume", "control-center", "session"]

[dock]
enabled = false
position = "bottom"
auto_hide = true
reserve_space = false
background_opacity = 0.61
inactive_opacity = 0.46
launcher_position = "none"

[desktop_widgets]
enabled = false

[location]
auto_locate = false
address = "Fuzhou, Fujian, China"

[weather]
enabled = true
unit = "metric"
effects = true

[theme]
mode = "light"
source = "wallpaper"
wallpaper_scheme = "muted"

[theme.templates]
builtin_ids = ["niri", "alacritty", "starship", "btop", "gtk3", "gtk4"]
community_ids = []
enable_builtin_templates = true
enable_community_templates = false

[wallpaper]
enabled = true
directory = "/usr/share/wallpapers/cachyos-wallpapers"
fill_mode = "crop"
transition = ["fade", "wipe", "disc", "stripes", "zoom", "honeycomb"]
transition_duration = 1500
edge_smoothness = 0.14
transition_on_startup = false

[wallpaper.default]
path = "/usr/share/wallpapers/cachyos-wallpapers/wave.png"

[wallpaper.automation]
enabled = false

[notification]
position = "top_right"

[osd]
position = "top_right"

[plugins]
enabled = []
